services:
  album-viewer:
    # Option A — build locally from this folder (default):
    build: .

    # Option B — build directly from GitHub, so you never have to copy
    # files to your server manually. Replace Option A above with this (and
    # fill in your own repo URL):
    #
    # build:
    #   context: https://github.com/<your-username>/photo-album-app.git#main
    #   dockerfile: Dockerfile
    #
    # See README.md for the full update workflow.

    container_name: album-viewer
    ports:
      - "8080:8080"
    volumes:
      # Change the left-hand path to the folder with your photos on the host.
      - /path/to/your/photos:/photos:ro
      # All app data (accounts, favorites, thumbnail cache, GPS index) lives
      # in a plain folder on your host — not a Docker-managed volume — so
      # it's easy to see, back up, and it's completely unaffected by
      # rebuilding or recreating the container. Change the left-hand path to
      # wherever you want this to live, e.g. on the same pool as your app.
      - /path/to/your/album-viewer-data:/cache
    environment:
      - PHOTOS_ROOT=/photos
      - CACHE_DIR=/cache
      - THUMB_SIZE=400
    restart: unless-stopped

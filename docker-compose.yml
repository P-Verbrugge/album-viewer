services:
  album-viewer:
    # Option A — build locally from this folder (default):
    build: .

    # Option B — build directly from GitHub, so you never have to copy
    # files to your server manually. Replace Option A above with this (and
    # fill in your own repo URL):
    #
    # build:
    #   context: https://github.com/<your-username>/photo-album-app.git#main
    #   dockerfile: Dockerfile
    #
    # See README.md for the full update workflow.

    container_name: album-viewer
    ports:
      - "8080:8080"
    volumes:
      # Change the left-hand path to the folder with your photos on the host.
      - /path/to/your/photos:/photos:ro
      # The thumbnail cache persists across restarts.
      - album-viewer-cache:/cache
    environment:
      - PHOTOS_ROOT=/photos
      - CACHE_DIR=/cache
      - THUMB_SIZE=400
    restart: unless-stopped

volumes:
  album-viewer-cache:

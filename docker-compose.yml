services:
  album-viewer:
    # Optie A — lokaal bouwen vanuit deze map (standaard):
    build: .

    # Optie B — rechtstreeks vanaf GitHub bouwen, dan hoef je nooit meer
    # bestanden handmatig naar TrueNAS te kopiëren. Vervang Optie A hierboven
    # door onderstaande (en pas de URL aan naar jouw eigen repo):
    #
    # build:
    #   context: https://github.com/<jouw-gebruikersnaam>/photo-album-app.git#main
    #   dockerfile: Dockerfile
    #
    # Zie README.md voor het volledige "update"-workflow.

    container_name: album-viewer
    ports:
      - "8080:8080"
    volumes:
      # Pas het linkerpad aan naar de map met jouw foto's op het host-systeem.
      - /pad/naar/jouw/fotos:/photos:ro
      # Thumbnail-cache blijft bewaard tussen herstarts.
      - album-viewer-cache:/cache
    environment:
      - PHOTOS_ROOT=/photos
      - CACHE_DIR=/cache
      - THUMB_SIZE=400
    restart: unless-stopped

volumes:
  album-viewer-cache:

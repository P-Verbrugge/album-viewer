<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Account aanmaken — Albums</title>
  <link rel="manifest" href="/static/manifest.json" />
  <meta name="theme-color" content="#121212" />
  <link rel="apple-touch-icon" href="/static/icons/apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Albums" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/style.css" />
  <script>
    (function () {
      var saved = localStorage.getItem("album-theme");
      document.documentElement.setAttribute("data-theme", saved === "light" ? "light" : "dark");
    })();
  </script>
</head>
<body class="auth-body">
  <main class="auth-page">
    <div class="auth-card">
      <div class="brand auth-brand">
        <span class="brand-mark">◍</span>
        <span class="brand-name">ALBUMS</span>
      </div>

      <h1 class="auth-title">Welkom! Maak je account aan</h1>
      <p class="auth-sub">
        Dit is de eerste keer dat je deze albumviewer opent. Kies een
        gebruikersnaam en wachtwoord — dit wordt je <strong>beheerdersaccount</strong>,
        waarmee je later ook andere gebruikers kunt toevoegen (via Instellingen).
      </p>

      {% if error %}
      <p class="auth-error">{{ error }}</p>
      {% endif %}

      <form method="post" class="auth-form">
        <label class="auth-label" for="username">Gebruikersnaam</label>
        <input class="auth-input" type="text" id="username" name="username" autocomplete="username" required autofocus />

        <label class="auth-label" for="password">Wachtwoord</label>
        <input class="auth-input" type="password" id="password" name="password" autocomplete="new-password" required minlength="6" />

        <label class="auth-label" for="password_confirm">Herhaal wachtwoord</label>
        <input class="auth-input" type="password" id="password_confirm" name="password_confirm" autocomplete="new-password" required minlength="6" />

        <button class="btn btn-primary auth-submit" type="submit">Account aanmaken</button>
      </form>
    </div>
  </main>
  <script src="/static/js/pwa-register.js"></script>
</body>
</html>
